<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

    <match target="pattern">
        <test qual="any" name="family"><string>BlinkMacSystemFont</string></test>
        <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family"><string>Arial</string></test>
        <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family"><string>Helvetica Neue</string></test>
        <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family"><string>Inter</string></test>
        <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family"><string>Liberation Sans</string></test>
        <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family"><string>Liberation Mono</string></test>
        <edit name="family" mode="assign" binding="same"><string>monospace</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family"><string>KaiTi</string></test>
        <edit name="family" mode="assign" binding="same"><string>AR PL UKai CN</string></edit>
    </match>

</fontconfig>
